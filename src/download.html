<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Download Document</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Download Document</h1>
        
        <input type="text" id="search" placeholder="Search by name">
        
        <select id="role">
            <option value="">All roles</option>
            <option value="owner">Owner</option>
            <option value="manager">Manager</option>
            <option value="worker">Worker</option>
        </select>
        
        <select id="type">
            <option value="">All types</option>
            <option value="contract">Contract</option>
            <option value="report">Report</option>
            <option value="invoices">Invoices</option>
        </select>
        
        <button onclick="search()">Search</button>
        
        <select id="documents" size="5" style="width:100%; margin:10px 0">
            <option value="">No documents</option>
        </select>
        
        <button onclick="download()">Download Selected</button>
        <button onclick="window.location.href='/'">Back</button>
        
        <div id="message"></div>
    </div>

    <script>
        async function search() {
            const q = document.getElementById('search').value;
            const role = document.getElementById('role').value;
            const type = document.getElementById('type').value;
            
            let url = '/api/search?';
            if (q) url += `q=${encodeURIComponent(q)}&`;
            if (role) url += `role=${encodeURIComponent(role)}&`;
            if (type) url += `doc_type=${encodeURIComponent(type)}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                const select = document.getElementById('documents');
                select.innerHTML = '';
                
                if (data.results && data.results.length) {
                    data.results.forEach(doc => {
                        const option = document.createElement('option');
                        option.value = doc.key;
                        const role = doc.metadata.role || 'no role';
                        const type = doc.metadata.doc_type || 'no type';
                        option.textContent = `${doc.key} (${role}, ${type})`;
                        select.appendChild(option);
                    });
                } else {
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = 'No documents found';
                    select.appendChild(option);
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }
        
        async function download() {
            const select = document.getElementById('documents');
            const docName = select.value;
            
            if (!docName || docName === 'No documents found') {
                alert('Please select a document');
                return;
            }
            
            window.location.href = `/api/download/${encodeURIComponent(docName)}`;
        }
        
        // Load on page load
        search();
    </script>
</body>
</html>
